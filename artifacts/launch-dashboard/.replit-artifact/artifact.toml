kind = "web"
previewPath = "/"
title = "Launch Dashboard"
version = "1.0.0"
id = "artifacts/launch-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21671

[services.development]
run = "pnpm --filter @workspace/launch-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/launch-dashboard", "run", "build" ]
publicDir = "artifacts/launch-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21671"
BASE_PATH = "/"
